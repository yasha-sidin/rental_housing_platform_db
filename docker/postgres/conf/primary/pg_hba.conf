# Локальный административный доступ внутри контейнера.
local   all             all                                     trust

# Обычные клиентские подключения к БД.
host    all             all             127.0.0.1/32            scram-sha-256
host    all             all             ::1/128                 scram-sha-256
host    all             all             0.0.0.0/0               scram-sha-256

# Физическая streaming replication.
host    replication     physical_replicator 0.0.0.0/0           scram-sha-256

# Подключение logical replication к проектной БД.
host    all             logical_replicator  0.0.0.0/0           scram-sha-256
