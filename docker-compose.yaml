version: '3.8'

services:
  rental_housing_platform_db:
    image: postgres:18-alpine
    container_name: rental_housing_platform_db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: rental_housing_platform_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5488"

volumes:
  postgres_data:
    driver: local
