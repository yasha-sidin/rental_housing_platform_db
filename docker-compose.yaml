version: '3.8'

services:
  rental_housing_platform_db:
    image: postgres:18-alpine
    container_name: rental_housing_platform_db
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5488:5432"

volumes:
  postgres_data:
    driver: local
