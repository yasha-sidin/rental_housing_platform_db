[databases]
rental_write = host=haproxy port=5000 dbname=rental_housing_platform_db
rental_read = host=haproxy port=5001 dbname=rental_housing_platform_db
rental_migration = host=haproxy port=5000 dbname=rental_housing_platform_db pool_mode=session

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432
auth_type = plain
auth_file = /tmp/pgbouncer-userlist.txt
pool_mode = transaction
server_lifetime = 120
server_idle_timeout = 30
server_reset_query = DISCARD ALL
ignore_startup_parameters = extra_float_digits
max_client_conn = 500
default_pool_size = 50
reserve_pool_size = 10
admin_users = pgbouncer_admin
